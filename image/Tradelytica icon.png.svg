<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" aria-label="Tradelytica App Icon">
  <defs>
    
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E2922"></stop>
      <stop offset="100%" stop-color="#0E0C07"></stop>
    </linearGradient>
    
    <radialGradient id="hot" cx="28%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#F2D89A" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#F2D89A" stop-opacity="0"></stop>
    </radialGradient>
    
    <radialGradient id="vig" cx="78%" cy="96%" r="80%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.6"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"></stop>
    </radialGradient>
    
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A4220"></stop>
      <stop offset="25%" stop-color="#B08840"></stop>
      <stop offset="50%" stop-color="#F2D89A"></stop>
      <stop offset="75%" stop-color="#C9A35A"></stop>
      <stop offset="100%" stop-color="#6E5022"></stop>
    </linearGradient>
    <radialGradient id="dotPearl" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFAEC"></stop>
      <stop offset="60%" stop-color="#ECE6D7"></stop>
      <stop offset="100%" stop-color="#C9C2B2"></stop>
    </radialGradient>
    
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"></rect>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    
    <rect width="1024" height="1024" fill="url(#plate)"></rect>
    
    <rect width="1024" height="1024" fill="url(#hot)"></rect>
    
    <rect width="1024" height="1024" fill="url(#vig)"></rect>
    
    <rect x="2" y="2" width="1020" height="1020" rx="228" ry="228" fill="none" stroke="#E8C788" stroke-opacity="0.06" stroke-width="2"></rect>

    
    <g transform="translate(204, 204) scale(6.16)">
      <rect x="8" y="8" width="76" height="76" fill="none" stroke="url(#gold)" stroke-width="1.4" opacity="0.85"></rect>
      <g stroke="url(#gold)" stroke-width="1.4" stroke-linecap="square">
        <path d="M8 14 L8 8 L14 8"></path>
        <path d="M78 8 L84 8 L84 14"></path>
        <path d="M84 78 L84 84 L78 84"></path>
        <path d="M14 84 L8 84 L8 78"></path>
      </g>
      <rect x="46" y="32" width="8" height="52" fill="url(#gold)"></rect>
      <rect x="22" y="28" width="70" height="8" fill="url(#gold)"></rect>
      <circle cx="92" cy="32" r="3.4" fill="url(#dotPearl)"></circle>
    </g>

    
    <rect x="0" y="0" width="1024" height="3" fill="#F2D89A" fill-opacity="0.30"></rect>
    
    <rect x="0" y="1021" width="1024" height="3" fill="#000000" fill-opacity="0.6"></rect>
  </g>
</svg>